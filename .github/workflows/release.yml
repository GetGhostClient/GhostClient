name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          name: Ghost Client ${{ github.ref_name }}
          body: |
            <p align="center">
              <img src="https://raw.githubusercontent.com/GetGhostClient/GhostClient/master/assets/logo.png" width="120" alt="Ghost Client logo"/>
            </p>

            ## Ghost Client ${{ github.ref_name }}

            > Runtime FFlag editor for Roblox — no injection, no detection.

            ### Download
            Grab **ghostclient.exe** below and run it as Administrator.  
            Offsets are fetched automatically from [imtheo.lol/Offsets](https://imtheo.lol/Offsets) on launch.

            ### What's new
            See the full [commit history](${{ github.server_url }}/${{ github.repository }}/compare/${{ github.ref_name }}...HEAD) for details.

            ---
            *Built on Windows · DirectX 11 · ImGui · Wanted Sans*
          files: build/Release/ghostclient.exe
          draft: false
          prerelease: false
